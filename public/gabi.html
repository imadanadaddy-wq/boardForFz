<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Gabi FZ</title>
<link rel="icon" href="/images/cat-logo.png">
<style>
  :root{
    --bg:#0f1115; --panel:#161a20; --line:#2a2f37; --text:#e7eaee;
    --muted:#9aa3ad; --accent:#00bcd4; --pink:#ffc6dd; --red:#e74c3c;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  .wrap{max-width:720px;margin:0 auto;padding:18px 14px 60px}
  .head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .head img{width:34px;height:34px;border-radius:8px}
  .head h1{font-size:20px;font-weight:800;margin:0;letter-spacing:.3px}
  .sub{color:var(--muted);font-size:11px;font-family:"JetBrains Mono",ui-monospace,monospace}
  .meta{display:flex;gap:8px;align-items:center;margin:6px 0 14px;flex-wrap:wrap}
  .chip{font-size:11px;font-family:"JetBrains Mono",ui-monospace,monospace;
    background:var(--panel);border:1px solid var(--line);border-radius:999px;
    padding:3px 10px;color:var(--muted)}
  .chip b{color:var(--text)}
  /* FZ 테이블 (메인 대시보드 룩 유지) */
  .fz{border:1px solid #888;background:#fff;border-radius:3px;overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,.35);
    font-family:Georgia,Cambria,"Times New Roman",serif;font-style:italic;font-weight:700}
  .row{display:flex;align-items:stretch;border-bottom:1px solid #c4c4c4;background:#fff;color:#000}
  .row:last-child{border-bottom:none}
  .row.off{opacity:.5}
  .row.cc{outline:2px solid var(--red);outline-offset:-2px;box-shadow:0 0 8px 1px rgba(231,76,60,.45)}
  .c-drag{width:20px;flex:0 0 20px;text-align:center;padding:11px 1px;cursor:grab;color:#bbb;font-size:11px;border-right:1px solid #c4c4c4;user-select:none;touch-action:none}
  .c-idx{width:28px;flex:0 0 28px;text-align:center;padding:9px 3px;font-style:normal;
    font-size:13px;border-right:1px solid #c4c4c4;display:flex;align-items:center;justify-content:center}
  .c-ign{flex:1;min-width:0;padding:11px 14px;border-right:1px solid #c4c4c4;font-size:14px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row.off .c-ign{text-decoration:line-through;color:#888}
  .c-fz{width:30px;flex:0 0 30px;text-align:center;padding:11px 2px;font-size:15px;font-style:normal;border-right:1px solid #c4c4c4;display:flex;align-items:center;justify-content:center}
  .c-ch{width:38px;flex:0 0 38px;text-align:center;padding:11px 4px;border-right:1px solid #c4c4c4;
    font-size:14px;display:flex;align-items:center;justify-content:center}
  .c-ch.has{background:var(--pink)}
  .c-map{flex:1.3;min-width:0;padding:11px 10px;font-size:13px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ccbadge{display:inline-block;margin-left:6px;background:var(--red);color:#fff;
    font-family:"JetBrains Mono",ui-monospace,monospace;font-style:normal;font-weight:800;
    font-size:9px;padding:1px 5px;border-radius:3px;vertical-align:middle}
  .empty{color:var(--muted);font-size:13px;padding:20px;text-align:center;
    border:1px dashed var(--line);border-radius:8px}
  .err{color:var(--red);font-size:13px;padding:16px;border:1px solid var(--red);
    border-radius:8px;font-family:"JetBrains Mono",ui-monospace,monospace}

  @media (max-width: 480px) {
    .wrap { padding: 12px 8px 40px; }
    .c-drag { width:16px!important;flex:0 0 16px!important;font-size:10px!important;padding:8px 1px!important }
    .c-idx  { width:22px!important;flex:0 0 22px!important;font-size:12px!important;padding:8px 2px!important }
    .c-fz   { width:26px!important;flex:0 0 26px!important;font-size:12px!important }
    .c-ch   { width:32px!important;flex:0 0 32px!important;font-size:13px!important;padding:8px 2px!important }
    .c-ign  { font-size:13px!important;padding:8px 8px!important }
    .c-map  { font-size:12px!important;padding:8px 6px!important }
    .row    { min-height:36px }
    .ccbadge{ font-size:8px!important;padding:1px 3px!important }
    .meta   { gap:5px }
    .chip   { font-size:10px!important;padding:2px 7px!important }
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
</head>
<body>
<div class="wrap">
  <div class="head">
    <img src="/images/cat-logo.png" alt="">
    <div>
      <h1>Gabi FZ List</h1>
      <div class="sub">read-only · auto refresh 15s</div>
    </div>
  </div>
  <div class="meta">
    <span class="chip">total <b id="m-total">0</b></span>
    <span class="chip">online <b id="m-online">0</b></span>
    <span class="chip" id="m-updated">—</span>
  </div>
  <div id="list"></div>
</div>

<script>
  // ★ 서버가 /gabi 응답 시 gabi 그룹 키를 주입함 (정적 파일엔 키가 없음)
  const FZ_KEY = "__FZ_GABI_KEY__";
  const GRP    = "gabi";
  const Q      = `grp=${GRP}&key=${encodeURIComponent(FZ_KEY)}`;

  const esc = s => String(s||"").replace(/[&<>"']/g,c=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  const $ = id => document.getElementById(id);

  let _sortable   = null;   // Sortable 인스턴스 저장 → destroy()용
  let _isDragging = false;  // 드래그 중엔 auto-refresh 차단

  async function load(){
    if (_isDragging) return;  // 드래그 중 재렌더 방지
    try{
      const [lr, sr] = await Promise.all([
        fetch(`/api/fz?${Q}`),
        fetch(`/api/fz/status?${Q}`),
      ]);
      if(!lr.ok){ const e=await lr.json().catch(()=>({})); return showErr(`Error ${lr.status}: ${e.error||'Unknown'}`); }
      const list = await lr.json();
      const stat = sr.ok ? await sr.json() : [];
      const smap = {}; for(const s of stat) smap[s.ign]=s;
      render(list, smap);
    }catch(e){ showErr("연결 실패: "+e.message); }
  }

  function showErr(msg){ $("list").innerHTML = `<div class="err">${esc(msg)}</div>`; }

  function render(list, smap){
    const now = Date.now();
    const CC_MS = 15*60*1000;
    let online = 0;
    if(!list.length){
      $("list").innerHTML = '<div class="empty">List is empty.</div>';
    }else{
      const t = document.createElement("div"); t.className="fz";
      list.forEach((e,i)=>{
        const s = smap[e.ign] || {};
        const isOn = !!s.online; if(isOn) online++;
        const ch = (s.channel!=null) ? s.channel : null;
        const mapName = s.map_name || null;
        const mapShort = mapName ? mapName.replace(/^\[[^\]]+\]\s*/,'') : null;
        const mapId = (s.map_id!=null) ? s.map_id : null;
        const mapTxt = mapShort ? esc(mapShort) : (mapId!=null?`#${mapId}`:(isOn?'-':'OFFLINE'));
        const ccTs = s.last_cc_ts ? Number(s.last_cc_ts) : 0;
        const isCc = ccTs>0 && (now-ccTs)<CC_MS;
        let ccBadge="";
        if(isCc){ const m=Math.max(1,Math.floor((now-ccTs)/60000)); ccBadge=`<span class="ccbadge">🔴 CC ${m}m</span>`; }
        const row = document.createElement("div");
        row.className = "row" + (isOn?"":" off") + (isCc?" cc":"");
        row.dataset.ign = e.ign;
        row.innerHTML =
          `<div class="c-drag">⠿</div>`+
          `<div class="c-idx">${i+1}</div>`+
          `<div class="c-ign">${esc(e.ign)}${ccBadge}</div>`+
          `<div class="c-fz">${s.fz_on===true?'🟢':(s.fz_on===false?'🔴':'⚪')}</div>`+
          `<div class="c-ch ${ch!=null?'has':''}">${ch!=null?ch:'-'}</div>`+
          `<div class="c-map">${mapTxt}</div>`;
        t.appendChild(row);
      });
      // 이전 Sortable 인스턴스를 destroy() 후 교체 (안 하면 전역 이벤트 리스너 누적)
      if (_sortable) { _sortable.destroy(); _sortable = null; }
      $("list").innerHTML=""; $("list").appendChild(t);
      if(typeof Sortable!=="undefined"){
        _sortable = Sortable.create(t,{
          animation: 150,
          handle: ".c-drag",
          onStart: function() { _isDragging = true; },
          onEnd: function() {
            _isDragging = false;
            // 번호 갱신 (Sortable이 DOM만 옮기고 텍스트는 안 바꿈)
            Array.from(t.children).forEach(function(row, i) {
              const idx = row.querySelector('.c-idx');
              if (idx) idx.textContent = i + 1;
            });
            // 저장
            const order = Array.from(t.children)
              .map(function(r) { return r.dataset.ign; })
              .filter(Boolean);
            if (order.length > 0) saveFzOrder(order);
          }
        });
      }
    }
    $("m-total").textContent  = list.length;
    $("m-online").textContent = online;
    $("m-updated").textContent= "updated " + new Date().toLocaleTimeString();
  }

  load();
  setInterval(load, 15000);
</script>
</body>
</html>
